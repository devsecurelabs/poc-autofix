name: Classify and Remediate
on:
  workflow_dispatch:
    inputs:
      file_path:
        description: "Repo-relative path to the vulnerable file"
        required: true
        default: "vulnerable_code/sample1.py"

jobs:
  call-orchestrator:
    name: Classify and Remediate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect language from file extension
        id: detect_lang
        run: |
          FILE="${{ github.event.inputs.file_path }}"
          EXT="${FILE##*.}"
          case "$EXT" in
            py)   LANG="python"     ;;
            js)   LANG="javascript" ;;
            ts)   LANG="typescript" ;;
            java) LANG="java"       ;;
            php)  LANG="php"        ;;
            rb)   LANG="ruby"       ;;
            cs)   LANG="csharp"     ;;
            dart) LANG="dart"       ;;
            *)    LANG="unknown"    ;;
          esac
          echo "lang=$LANG" >> $GITHUB_OUTPUT
          echo "Detected language: $LANG (extension: .$EXT)"

      - name: Install Semgrep (silent oracle)
        run: pip install semgrep --quiet

      - name: Run Semgrep broad-spectrum scan
        id: semgrep
        continue-on-error: true
        run: |
          semgrep scan \
            --config "p/php" \
            --config "p/ruby" \
            --config "p/csharp" \
            --config "p/javascript" \
            --config "p/typescript" \
            --config "p/python" \
            --config "p/java" \
            --config "p/security-audit" \
            --json \
            --output results.json \
            "${{ github.event.inputs.file_path }}" || true
          echo "Semgrep scan complete."

      - name: Build JSON payload
        id: build_json
        run: |
          # Extract CVE from Semgrep results if present (silent oracle — discarded by orchestrator normalisation layer)
          CVE_ID=$(jq -r '.results[0].extra.metadata.cve // empty' results.json 2>/dev/null || echo "")

          # Build payload — --rawfile avoids all shell-expansion hazards with $ in PHP/Ruby/Dart code
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg path "${{ github.event.inputs.file_path }}" \
            --rawfile code "${{ github.event.inputs.file_path }}" \
            --arg lang "${{ steps.detect_lang.outputs.lang }}" \
            --arg cve_id "$CVE_ID" \
            '{
              repo: $repo,
              file_path: $path,
              code: $code,
              language: $lang,
              cve_id: (if $cve_id == "" then null else $cve_id end)
            }' > payload.json

          echo "Payload generated successfully."

      - name: POST to DevSecure Worker
        env:
          WORKER_SECRET: ${{ secrets.DEVSECURE_WORKER_SECRET }}
        run: |
          HTTP_STATUS=$(curl --silent --show-error \
            --output response.json \
            --write-out "%{http_code}" \
            --request POST "https://devsecure-orchestrator.quadri-jay.workers.dev/remediate" \
            --header "Content-Type: application/json" \
            --header "Authorization: Bearer $WORKER_SECRET" \
            --data @payload.json)

          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            cat response.json
            exit 1
          fi

      - name: Job Summary
        run: |
          ACTION=$(jq -r '.action // "unknown"' response.json)
          GITHUB_URL=$(jq -r '.github_url // "N/A"' response.json)
          CWE=$(jq -r '.classification.cwe_id // "N/A"' response.json)
          LANG="${{ steps.detect_lang.outputs.lang }}"
          RPS=$(jq -r '.risk.rps_score // "N/A"' response.json)
          PRIORITY=$(jq -r '.risk.final_priority_score // "N/A"' response.json)
          RPS_SOURCE=$(jq -r '.risk.source // "N/A"' response.json)

          echo "## DevSecure Remediation Result" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Action** | \`$ACTION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Language** | $LANG |" >> $GITHUB_STEP_SUMMARY
          echo "| **CWE** | $CWE |" >> $GITHUB_STEP_SUMMARY
          echo "| **Exploit Activity (RPS)** | **$RPS / 100** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Final Priority Score** | $PRIORITY / 100 |" >> $GITHUB_STEP_SUMMARY
          echo "| **RPS Source** | $RPS_SOURCE |" >> $GITHUB_STEP_SUMMARY
          echo "| **GitHub Link** | [View Here]($GITHUB_URL) |" >> $GITHUB_STEP_SUMMARY
