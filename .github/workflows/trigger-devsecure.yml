name: Classify and Remediate
on:
  workflow_dispatch:
    inputs:
      file_path:
        description: "Repo-relative path to the vulnerable file"
        required: true
        default: "vulnerable_code/sample1.py"

jobs:
  call-orchestrator:
    name: Classify and Remediate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build JSON payload
        id: build_json
        run: |
          # We use --rawfile to safely ingest the code without shell expansion issues
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg path "${{ github.event.inputs.file_path }}" \
            --rawfile code "${{ github.event.inputs.file_path }}" \
            --arg lang "python" \
            '{repo: $repo, file_path: $path, code: $code, language: $lang}' > payload.json
          
          echo "Payload generated successfully."

      - name: POST to DevSecure Worker
        env:
          WORKER_SECRET: ${{ secrets.DEVSECURE_WORKER_SECRET }}
        run: |
          HTTP_STATUS=$(curl --silent --show-error \
            --output response.json \
            --write-out "%{http_code}" \
            --request POST "https://devsecure-orchestrator.quadri-jay.workers.dev/remediate" \
            --header "Content-Type: application/json" \
            --header "Authorization: Bearer $WORKER_SECRET" \
            --data @payload.json)
          
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            cat response.json
            exit 1
          fi

      - name: Job Summary
        run: |
          # 1. Parse the new risk fields from the response.json
          ACTION=$(jq -r '.action // "unknown"' response.json)
          GITHUB_URL=$(jq -r '.github_url // "N/A"' response.json)
          CWE=$(jq -r '.classification.cwe_id // "N/A"' response.json)
          RPS=$(jq -r '.risk.rps_score // "N/A"' response.json)
          PRIORITY=$(jq -r '.risk.final_priority_score // "N/A"' response.json)
          
          # 2. Write the markdown table to the GitHub Step Summary
          echo "## 🛡️ DevSecure Remediation Result" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Action** | \`$ACTION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **CWE** | $CWE |" >> $GITHUB_STEP_SUMMARY
          echo "| **Exploit Activity (RPS)** | **$RPS / 100** |" >> $GITHUB_STEP_SUMMARY
          echo "| **Final Priority Score** | $PRIORITY / 100 |" >> $GITHUB_STEP_SUMMARY
          echo "| **GitHub Link** | [View Here]($GITHUB_URL) |" >> $GITHUB_STEP_SUMMARY