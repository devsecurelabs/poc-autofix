name: Trigger DevSecure Orchestrator

on:
  workflow_dispatch:
    inputs:
      file_path:
        description: "Repo-relative path to the vulnerable file"
        required: true
        type: string
        default: "vulnerable_code/sample1.py"

jobs:
  call-orchestrator:
    name: Classify & Remediate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read file content
        id: read
        run: |
          FILE="${{ github.event.inputs.file_path }}"
          if [ ! -f "$FILE" ]; then
            echo "::error::File not found: $FILE"
            exit 1
          fi
          CODE_CONTENT=$(cat "$FILE")
          # Export for the next step — use a delimiter to handle multi-line values
          {
            echo "CODE_CONTENT<<__EOF__"
            echo "$CODE_CONTENT"
            echo "__EOF__"
          } >> "$GITHUB_ENV"

      - name: Build JSON payload
        run: |
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg path "${{ github.event.inputs.file_path }}" \
            --arg code "$CODE_CONTENT" \
            --arg lang "python" \
            '{repo: $repo, file_path: $path, code: $code, language: $lang}' > payload.json

          echo "::group::Payload (code redacted)"
          jq '. + {code: "<<redacted>>"}' payload.json
          echo "::endgroup::"

      - name: POST to DevSecure Worker
        env:
          WORKER_SECRET: ${{ secrets.DEVSECURE_WORKER_SECRET }}
        run: |
          HTTP_STATUS=$(curl --silent --show-error \
            --output response.json \
            --write-out "%{http_code}" \
            --request POST \
            --header "Content-Type: application/json" \
            --header "Authorization: Bearer $WORKER_SECRET" \
            --data @payload.json \
            "https://devsecure-orchestrator.quadri-jay.workers.dev/remediate")

          echo "HTTP status: $HTTP_STATUS"
          echo "::group::Worker response"
          jq . response.json
          echo "::endgroup::"

          ACTION=$(jq -r '.action // "unknown"' response.json)
          GITHUB_URL=$(jq -r '.github_url // "N/A"' response.json)
          CWE=$(jq -r '.classification.cwe_id // "N/A"' response.json)

          {
            echo "## DevSecure Result"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| **Action** | \`$ACTION\` |"
            echo "| **CWE** | $CWE |"
            echo "| **GitHub URL** | $GITHUB_URL |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Worker returned HTTP $HTTP_STATUS"
            exit 1
          fi
