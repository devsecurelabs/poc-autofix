- name: Build JSON payload
        run: |
          # Use --rawfile to safely read the entire file content into a JSON variable
          # This is much safer than using shell variables for multi-line code
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg path "${{ github.event.inputs.file_path }}" \
            --rawfile code "${{ github.event.inputs.file_path }}" \
            --arg lang "python" \
            '{repo: $repo, file_path: $path, code: $code, language: $lang}' > payload.json

      - name: POST to DevSecure Worker
        env:
          WORKER_SECRET: ${{ secrets.DEVSECURE_WORKER_SECRET }}
        run: |
          # The URL MUST come after the options or be explicitly marked with --url
          # Using @payload.json ensures curl handles the multi-line data perfectly
          curl --request POST "https://devsecure-orchestrator.quadri-jay.workers.dev/remediate" \
               --header "Content-Type: application/json" \
               --header "Authorization: Bearer $WORKER_SECRET" \
               --data @payload.json \
               --verbose \
               --output response.json