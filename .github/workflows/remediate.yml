name: Automated Code Remediation Pipeline

# Trigger this workflow only when files in the vulnerable_code/ directory are pushed
on:
  push:
    paths:
      - 'vulnerable_code/**'

jobs:
  remediate:
    name: Analyze and Fix Code
    runs-on: ubuntu-latest
    
    # Grant the action permission to write back to the repository
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to accurately detect changed files

      - name: Get changed files
        id: changed-files
        # This community action easily lists exactly which files triggered the push
        uses: tj-actions/changed-files@v44
        with:
          files: vulnerable_code/**

      - name: Send to Cloudflare Worker and Save Fix
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          WORKER_SECRET: ${{ secrets.DEVSECURE_WORKER_SECRET }}
        run: |
          # Guard: fail fast with a clear message if the secret is missing or empty
          if [ -z "$CF_WORKER_URL" ]; then
            echo "❌ Missing CF_WORKER_URL — set it as a repository secret."
            exit 1
          fi

          # Append /remediate endpoint — works whether the secret has a trailing slash or not
          ENDPOINT="${CF_WORKER_URL%/}/remediate"

          # Loop through every new/modified file in the vulnerable_code directory
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "Processing $file..."

            # Extract filename and extension to build the output path
            filename=$(basename -- "$file")
            extension="${file##*.}"
            name="${filename%.*}"

            # Apply the naming convention: sample1_fixed.py
            fixed_filename="${name}_fixed.${extension}"
            output_path="remediated_code/${fixed_filename}"

            # Ensure the output directory exists
            mkdir -p remediated_code

            # --rawfile reads the file as a raw string — safely handles newlines,
            # quotes, backslashes, and $ signs that break $(cat $file) substitution
            jq -n \
              --arg repo    "${{ github.repository }}" \
              --arg path    "$file" \
              --rawfile code "$file" \
              --arg lang    "$extension" \
              '{repo: $repo, file_path: $path, code: $code, language: $lang}' > payload.json

            # Debug: log payload shape without the code field to keep logs readable
            echo "Payload check (code omitted):"
            jq 'del(.code)' payload.json

            echo "Sending $filename to $ENDPOINT..."

            HTTP_STATUS=$(curl --silent --show-error \
              --output response.json \
              --write-out "%{http_code}" \
              --request POST "$ENDPOINT" \
              --header "Content-Type: application/json" \
              --header "Authorization: Bearer $WORKER_SECRET" \
              --data @payload.json)

            echo "HTTP status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ Remediation successful for $filename!"
              ACTION=$(jq -r '.action // "unknown"' response.json)
              GITHUB_URL=$(jq -r '.github_url // "N/A"' response.json)
              echo "Action: $ACTION | GitHub URL: $GITHUB_URL"
              # Save a local copy of the fix for the commit step
              jq -r '.remediation_status // empty' response.json
              if [ "$ACTION" = "pr_opened" ]; then
                jq -r '.fixed_code // empty' response.json > "$output_path"
                echo "Saved fix to $output_path"
              fi
            else
              echo "❌ Failed to remediate $filename. HTTP status: $HTTP_STATUS"
              cat response.json
              exit 1
            fi
          done

      - name: Commit and Push Remediated Code
        run: |
          # Configure git as the GitHub Actions bot
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage the newly created files
          git add remediated_code/
          
          # Check if there are actually changes to commit (prevents empty commit errors)
          if git diff-index --quiet HEAD --; then
            echo "No new remediations to commit."
          else
            # The [skip ci] tag prevents this commit from accidentally triggering other workflows
            git commit -m "Automated remediation: Added fixed code from Hugging Face AI [skip ci]"
            git push
            echo "🎉 Successfully pushed remediated code to the repository!"
          fi