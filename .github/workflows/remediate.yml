name: Automated Code Remediation Pipeline

on:
  push:
    paths:
      - 'vulnerable_code/**'

jobs:
  remediate:
    name: Analyze and Fix Code
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      # Explicit URL — never rely on a secret for the base URL to avoid "no URL specified" errors
      WORKER_URL: "https://devsecure-orchestrator.quadri-jay.workers.dev/remediate"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: vulnerable_code/**

      - name: Send to Cloudflare Worker and Save Fix
        env:
          WORKER_SECRET: ${{ secrets.DEVSECURE_WORKER_SECRET }}
        run: |
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "Processing $file..."

            filename=$(basename -- "$file")
            extension="${filename##*.}"
            name="${filename%.*}"
            fixed_filename="${name}_fixed.${extension}"
            output_path="remediated_code/${fixed_filename}"
            mkdir -p remediated_code

            # --rawfile safely handles multi-line code, quotes, backslashes, and special chars
            jq -n \
              --arg repo    "${{ github.repository }}" \
              --arg path    "$file" \
              --rawfile code "$file" \
              --arg lang    "${extension}" \
              '{repo: $repo, file_path: $path, code: $code, language: $lang}' > payload.json

            echo "Sending $filename to Worker..."

            HTTP_STATUS=$(curl --silent --show-error \
              --output response.json \
              --write-out "%{http_code}" \
              --request POST "$WORKER_URL" \
              --header "Content-Type: application/json" \
              --header "Authorization: Bearer $WORKER_SECRET" \
              --data @payload.json)

            echo "HTTP status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" -eq 200 ]; then
              ACTION=$(jq -r '.action // "unknown"' response.json)
              echo "Worker action: $ACTION"

              if [ "$ACTION" = "pr_opened" ]; then
                # Worker opened a PR — extract fixed_code from remediation for local save
                jq -r '.fixed_code // empty' response.json > "$output_path"
                GITHUB_URL=$(jq -r '.github_url // ""' response.json)
                echo "PR opened: $GITHUB_URL"
                echo "Saved fix to $output_path"
              elif [ "$ACTION" = "issue_escalated" ]; then
                GITHUB_URL=$(jq -r '.github_url // ""' response.json)
                echo "L4 escalation — issue opened: $GITHUB_URL"
              else
                echo "Unexpected action value: $ACTION"
                cat response.json
              fi
            else
              echo "Failed to remediate $filename. HTTP status: $HTTP_STATUS"
              cat response.json
              exit 1
            fi
          done

      - name: Commit and Push Remediated Code
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add remediated_code/
          if git diff-index --quiet HEAD --; then
            echo "No new remediations to commit."
          else
            git commit -m "chore: automated remediation output [skip ci]"
            git push
            echo "Pushed remediated code to repository."
          fi
