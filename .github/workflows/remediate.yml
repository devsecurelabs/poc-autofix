name: Automated Code Remediation Pipeline

on:
  push:
    paths:
      - 'vulnerable_code/**'

# Suppress Node.js deprecation warnings from community actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  remediate:
    name: Analyze and Fix Code
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: vulnerable_code/**

      - name: Send to Cloudflare Worker and Save Fix
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          WORKER_SECRET: ${{ secrets.DEVSECURE_WORKER_SECRET }}
        run: |
          # Guard: fail fast with a clear message if the secret is missing or empty
          if [ -z "$CF_WORKER_URL" ]; then
            echo "❌ Missing CF_WORKER_URL — set it as a repository secret."
            exit 1
          fi

          # Append /remediate — works whether the secret has a trailing slash or not
          ENDPOINT="${CF_WORKER_URL%/}/remediate"

          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "Processing $file..."

            filename=$(basename -- "$file")
            extension="${file##*.}"
            name="${filename%.*}"
            fixed_filename="${name}_fixed.${extension}"
            output_path="remediated_code/${fixed_filename}"
            mkdir -p remediated_code

            # --rawfile reads the file as raw bytes — safely handles newlines,
            # quotes, backslashes, and $ signs that break $(cat $file) substitution
            JSON_PAYLOAD=$(jq -n \
              --arg repo "${{ github.repository }}" \
              --arg path "$file" \
              --rawfile code "$file" \
              --arg lang "$extension" \
              '{repo: $repo, file_path: $path, code: $code, language: $lang}')

            # Debug: verify metadata fields before sending (code field omitted for log clarity)
            echo "Payload check:"
            echo "$JSON_PAYLOAD" | jq 'del(.code)'

            echo "Sending $filename to $ENDPOINT..."

            HTTP_STATUS=$(curl -s -w "%{http_code}" -o response.json -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $WORKER_SECRET" \
              -d "$JSON_PAYLOAD" \
              "$ENDPOINT")

            echo "HTTP status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ Remediation successful for $filename!"
              ACTION=$(jq -r '.action // "unknown"' response.json)
              GITHUB_URL=$(jq -r '.github_url // "N/A"' response.json)
              echo "Action: $ACTION | GitHub URL: $GITHUB_URL"
              if [ "$ACTION" = "pr_opened" ]; then
                jq -r '.fixed_code // empty' response.json > "$output_path"
                echo "Saved fix to $output_path"
              fi
            else
              echo "❌ Failed to remediate $filename. HTTP status: $HTTP_STATUS"
              cat response.json
              exit 1
            fi
          done

      - name: Commit and Push Remediated Code
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add remediated_code/
          if git diff-index --quiet HEAD --; then
            echo "No new remediations to commit."
          else
            git commit -m "chore: automated remediation output [skip ci]"
            git push
            echo "Pushed remediated code to repository."
          fi
