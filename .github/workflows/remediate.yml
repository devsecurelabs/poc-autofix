name: Automated Code Remediation Pipeline

on:
  push:
    paths:
      - 'vulnerable_code/**'
  workflow_dispatch: # Allows manual triggering for testing

jobs:
  remediate:
    name: Analyze and Fix Code
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: vulnerable_code/**

      - name: Set up Python for detection layer
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run static analysis
        id: scan
        continue-on-error: true
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          set -uo pipefail

          # Install static analysis engine (fail-safe: continue if unavailable)
          pip install opengrep --quiet 2>/dev/null || true

          # Scope to vulnerable_code/** only
          TARGET_FILES=""
          for f in $CHANGED_FILES; do
            [[ "$f" == vulnerable_code/* ]] && TARGET_FILES="$TARGET_FILES $f"
          done
          TARGET_FILES="$(echo "$TARGET_FILES" | xargs)"

          if [ -z "$TARGET_FILES" ]; then
            echo "[ANALYSIS] No in-scope files — scan skipped."
            echo '{"results":[],"errors":[]}' > scan_results.json
            exit 0
          fi

          echo "[ANALYSIS] Scanning $(echo "$TARGET_FILES" | wc -w) file(s)."

          # Run analysis; capture results even on non-zero exit (findings = exit 1)
          opengrep scan --json --output scan_results.json $TARGET_FILES 2>/dev/null || true

          if [ ! -f scan_results.json ]; then
            echo "[ANALYSIS] No output produced — writing empty result."
            echo '{"results":[],"errors":[]}' > scan_results.json
          fi

          echo "[ANALYSIS] Scan complete."

      - name: Normalise detection output
        id: detection
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, sys

          SEVERITY_RANK = {"ERROR": 3, "WARNING": 2, "INFO": 1}
          EMPTY = {"available": False}

          def extract_cwe(metadata):
              """Normalise CWE — e.g. ["CWE-89: SQL Injection"] → "CWE-89". Returns None if absent."""
              raw = metadata.get("cwe") or metadata.get("cwe-id")
              if not raw:
                  return None
              if isinstance(raw, list):
                  raw = raw[0]
              token = str(raw).split(":")[0].strip()
              return token if token.upper().startswith("CWE-") else None

          def extract_cve(metadata):
              """CVE — optional enrichment only; never inferred."""
              raw = metadata.get("cve") or metadata.get("cve-id")
              if raw and str(raw).upper().startswith("CVE-"):
                  return str(raw)
              return None

          try:
              with open("scan_results.json") as f:
                  raw = json.load(f)
          except Exception as e:
              print(f"[DETECTION] Could not read scan output ({e}) — skipping.")
              json.dump(EMPTY, open("ds_detection.json", "w"))
              sys.exit(0)

          results = raw.get("results", [])
          if not results:
              print("[DETECTION] No findings — signal not injected.")
              json.dump(EMPTY, open("ds_detection.json", "w"))
              sys.exit(0)

          # Sort all results by severity descending; stable (first match wins on tie)
          ranked = sorted(results, key=lambda r: SEVERITY_RANK.get(
              r.get("extra", {}).get("severity", "INFO").upper(), 0), reverse=True)

          # Primary finding — backward-compat ds_detection object
          best = ranked[0]
          meta_best = best.get("extra", {}).get("metadata", {})
          primary_cwe = extract_cwe(meta_best)
          primary_cve = extract_cve(meta_best)
          primary_rule = best.get("check_id", "unknown")

          ds = {"type": "static_code", "rule_id": primary_rule}
          if primary_cwe: ds["cwe_hint"] = primary_cwe
          if primary_cve: ds["cve_id"]   = primary_cve

          # Multi-CWE detected_issues array — up to 3 unique CWE findings, ranked by severity
          seen_cwes = set()
          detected_issues = []
          for finding in ranked:
              if len(detected_issues) >= 3:
                  break
              meta = finding.get("extra", {}).get("metadata", {})
              cwe = extract_cwe(meta)
              rule = finding.get("check_id", "unknown")
              if cwe and cwe not in seen_cwes:
                  seen_cwes.add(cwe)
                  entry = {"cwe_id": cwe, "rule_id": rule}
                  cve = extract_cve(meta)
                  if cve:
                      entry["cve_id"] = cve
                  detected_issues.append(entry)

          output = {
              "available": True,
              "ds_detection": ds,
              "detected_issues": detected_issues,
          }
          json.dump(output, open("ds_detection.json", "w"))
          print(f"[DETECTION] Signal normalised — primary rule={primary_rule} cwe={primary_cwe} cve={primary_cve}")
          print(f"[DETECTION] detected_issues ({len(detected_issues)}): {[i['cwe_id'] for i in detected_issues]}")
          PYEOF

      - name: Send to Cloudflare Worker and Save Fix
        env:
          CF_WORKER_URL: ${{ secrets.CF_WORKER_URL }}
          WORKER_SECRET: ${{ secrets.DEVSECURE_WORKER_SECRET }}
        run: |
          # Ensure output directory exists
          mkdir -p remediated_code

          # Fail fast if secret missing
          if [ -z "$WORKER_SECRET" ]; then
            echo "❌ WORKER_SECRET is missing"
            exit 1
          fi

          # Normalize Worker endpoint (handles trailing slash safely)
          ENDPOINT="${CF_WORKER_URL%/}/remediate"

          # Debug: confirm endpoint and token are resolved before any curl call
          echo "Calling endpoint: ${CF_WORKER_URL%/}/remediate"
          echo "Token length: ${#WORKER_SECRET}"

          # Read detection signal produced by normalisation step (optional)
          DS_AVAILABLE=$(jq -r '.available // false' ds_detection.json 2>/dev/null || echo "false")
          if [ "$DS_AVAILABLE" = "true" ]; then
            DS_PAYLOAD=$(jq '.ds_detection' ds_detection.json)
            DI_PAYLOAD=$(jq '.detected_issues // []' ds_detection.json)
            echo "[DETECTION] Signal present — injecting ds_detection and detected_issues into request."
          else
            DS_PAYLOAD="null"
            DI_PAYLOAD="[]"
            echo "[DETECTION] No signal — proceeding without detection context."
          fi

          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do

            # Guard: file must exist
            if [ ! -f "$file" ]; then
              echo "⚠️ Skipping missing file: $file"
              continue
            fi

            # Guard: file must be non-empty
            if [ ! -s "$file" ]; then
              echo "⚠️ Skipping empty file: $file"
              continue
            fi

            # Guard: restrict to supported source extensions (matches trigger-devsecure.yml)
            case "$file" in
              *.py|*.js|*.ts|*.php|*.java|*.rb|*.cs|*.dart) ;;
              *) echo "⚠️ Skipping unsupported file: $file"; continue ;;
            esac

            echo "📄 Processing file: $file"

            filename=$(basename -- "$file")
            extension="${file##*.}"
            name="${filename%.*}"
            output_path="remediated_code/${name}_fixed.${extension}"

            # Normalise extension → canonical language name (matches trigger-devsecure.yml)
            case "$extension" in
              py)   LANG="python"     ;;
              js)   LANG="javascript" ;;
              ts)   LANG="typescript" ;;
              java) LANG="java"       ;;
              php)  LANG="php"        ;;
              rb)   LANG="ruby"       ;;
              cs)   LANG="csharp"     ;;
              dart) LANG="dart"       ;;
              *)    LANG="$extension" ;;
            esac

            # Build payload — include ds_detection and detected_issues when available
            if [ "$DS_AVAILABLE" = "true" ]; then
              JSON_PAYLOAD=$(jq -n \
                --arg repo "${{ github.repository }}" \
                --arg path "$file" \
                --rawfile code "$file" \
                --arg lang "$LANG" \
                --argjson ds_detection "$DS_PAYLOAD" \
                --argjson detected_issues "$DI_PAYLOAD" \
                '{repo: $repo, file_path: $path, code: $code, language: $lang, ds_detection: $ds_detection, detected_issues: $detected_issues}')
            else
              JSON_PAYLOAD=$(jq -n \
                --arg repo "${{ github.repository }}" \
                --arg path "$file" \
                --rawfile code "$file" \
                --arg lang "$LANG" \
                '{repo: $repo, file_path: $path, code: $code, language: $lang}')
            fi

            echo "Sending $filename to Orchestrator..."

            # POST to Worker with Authorization header
            HTTP_STATUS=$(curl -s -w "%{http_code}" -o response.json \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $WORKER_SECRET" \
              -H "X-Trace-Id: gha-${GITHUB_RUN_ID}-${RANDOM}" \
              -d "$JSON_PAYLOAD" \
              "$ENDPOINT")

            echo "HTTP Status: $HTTP_STATUS"
            echo "Worker response:"
            cat response.json

            if [ "$HTTP_STATUS" -eq 200 ]; then
              ACTION=$(jq -r '.action // "unknown"' response.json)
              CWE=$(jq -r '.classification.cwe_id // "N/A"' response.json)

              echo "✅ Worker Result: $ACTION (CWE: $CWE)"

              if [ "$ACTION" == "pr_opened" ]; then
                # Extract the fix from the remediation object
                jq -r '.remediation.fixed_code // .fixed_code // empty' response.json > "$output_path"
                echo "💾 Patch saved to $output_path"
              elif [ "$ACTION" == "issue_escalated" ]; then
                echo "⚠️ Escalated to L4 Manual Queue. No local file generated."
                rm -f "$output_path"
              fi
            else
              echo "❌ Worker Auth/Communication Failure. Status: $HTTP_STATUS"
              cat response.json
              exit 1
            fi
          done

      - name: Commit and Push Remediated Code
        env:
          # Opt-in to Node 24 to clear deprecation warnings
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add remediated_code/

          if git diff --cached --quiet; then
            echo "No new remediations to commit (likely escalated or no changes)."
          else
            git commit -m "fix(security): automated remediation patch [skip ci]"
            git push
            echo "🎉 Pushed remediated code to repository."
          fi
