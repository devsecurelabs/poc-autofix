jobs:
  devsecure-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. Run OpenGrep (or Semgrep)
      - name: Run OpenGrep
        run: |
          # Run the scanner and output to JSON
          opengrep scan --config auto --json > results.json || true
          
      # 2. Parse and POST to Cloudflare Worker
      - name: Trigger DevSecure Orchestrator
        run: |
          # Extract first finding's CVE metadata (if it exists) using jq
          CVE_ID=$(jq -r '.results[0].extra.metadata.cve // empty' results.json)
          FILE_PATH=$(jq -r '.results[0].path' results.json)
          
          # POST to your Cloudflare Worker
          curl -X POST https://devsecure-orchestrator.quadri-jay.workers.dev/remediate \
            -H "Content-Type: application/json" \
            -d "{
              \"file_path\": \"$FILE_PATH\",
              \"cve_id\": \"$CVE_ID\"
            }"
