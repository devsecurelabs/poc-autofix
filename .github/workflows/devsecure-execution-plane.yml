- name: Trigger DevSecure Orchestrator
        env:
          WORKER_URL: ${{ secrets.CF_WORKER_URL || 'https://devsecure-orchestrator.quadri-jay.workers.dev' }}
          WORKER_SECRET: ${{ secrets.DEVSECURE_WORKER_SECRET }}
        run: |
          # 1. Extract first finding's CVE metadata  
          CVE_ID=$(jq -r '.results[0].extra.metadata.cve // empty' results.json)
          FILE_PATH=$(jq -r '.results[0].path' results.json)
          
          # 2. POST to your Cloudflare Worker using the mapped secret
          curl -X POST "$WORKER_URL/remediate" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $WORKER_SECRET" \
            -d "{\"file_path\": \"$FILE_PATH\", \"cve_id\": \"$CVE_ID\"}"